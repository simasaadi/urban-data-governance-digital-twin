# Business Rules for Governance and AI-Readiness Scoring

data_quality_score:
  description: Composite score based on completeness, validity, uniqueness, consistency, and timeliness.
  maximum_score: 100

governance_maturity_score:
  description: Composite score based on owner assignment, steward assignment, metadata completeness, classification, lineage, and business rule documentation.
  maximum_score: 100

ai_readiness_score:
  description: Composite score used to determine whether a dataset is ready for AI, automation, advanced analytics, or executive reporting.
  scoring_inputs:
    - data_quality_score
    - metadata_completeness_score
    - lineage_status
    - classification_status
    - business_rule_documentation
    - access_risk_level
  readiness_categories:
    ready: 80-100
    needs_remediation: 50-79
    not_ready: 0-49
    restricted: sensitive_or_confidential_high_risk

access_risk_logic:
  low:
    description: Public or low-sensitivity data with documented access conditions.
  medium:
    description: Internal data requiring business justification or role-based access.
  high:
    description: Confidential, sensitive, restricted, or externally shared data requiring approval and review.
